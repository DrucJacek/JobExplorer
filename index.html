<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>JobExplorer</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>JobExplorer</h1>
        <nav>
            <ul>
                <li><a href="#" id="nav-list">Oferty pracy</a></li>
                <li><a href="#" id="nav-form">Aplikuj (Formularz)</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="view-list">
            <h2>Dostępne oferty pracy</h2>
            <div class="filters">
                <input type="text" id="search" placeholder="Szukaj stanowiska...">
            </div>
            
            <div class="grid-container" id="jobs-container">
                <article class="card">
                    <h3>Frontend Developer</h3>
                    <p>Firma: Tech Corp</p>
                    <button class="btn-details">Szczegóły</button>
                </article>
            </div>
        </section>

        <section id="view-details" class="hidden">
            <button id="btn-back">Powrót do listy</button>
            <article id="job-details-content">
                <h2>Szczegóły stanowiska</h2>
                <p>Tutaj JavaScript załaduje pełny opis, wymagania itd.</p>
            </article>
        </section>

        <section id="view-form" class="hidden">
            <h2>Formularz aplikacyjny</h2>
            <form id="apply-form" action="#" method="post">
                <label for="name">Imię i nazwisko:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required> <label for="message">Wiadomość / Link do CV:</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <button type="submit">Wyślij aplikację</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; Projekt zespołowy PS - Technologie WWW</p>
    </footer>
</body>
</html>
