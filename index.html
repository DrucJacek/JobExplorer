<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobExplorer - Oferty Pracy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>JobExplorer</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Oferty pracy</a></li>

                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h2 style="margin-bottom: 1rem;">Dostępne oferty pracy</h2>
        
        <div class="filters">
            <input type="text" id="search" placeholder="Szukaj stanowiska lub firmy...">
        </div>
        
        <div class="grid-container">
            <article class="card">
                <h3>Frontend Developer</h3>
                <p><strong>Firma:</strong> Tech Corp</p>
                <p><strong>Lokalizacja:</strong> Warszawa</p>
                <button onclick="window.location.href='details-frontend.html'">Szczegóły</button>
            </article>

            <article class="card">
                <h3>Backend Developer</h3>
                <p><strong>Firma:</strong> CodeHouse</p>
                <p><strong>Lokalizacja:</strong> Kraków</p>
                <button onclick="window.location.href='details-backend.html'">Szczegóły</button>
            </article>

            <article class="card">
                <h3>UX/UI Designer</h3>
                <p><strong>Firma:</strong> DesignerPro</p>
                <p><strong>Lokalizacja:</strong> Zdalnie</p>
                <button onclick="window.location.href='details-ux.html'">Szczegóły</button>
            </article>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Projekt WWW</p>
    </footer>
</body>
</html>
